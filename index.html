        * {

            scroll-behavior: smooth;
        }

        nav {

            width: 50px;

            border-radius: 50%;
            border: 2px solid var(--primary-gold);
        }

        .logo span {

            font-weight: 900;
            color: var(--primary-gold);
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
