<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Malaysian Lottery - Premium 4D Results & Services</title>
    <style>
        /* ===== GLOBAL RESET & PRESTIGIOUS SERIF FONTS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #FFD700;
            --deep-gold: #C5A059;
            --dark-black: #111111;
            --luxury-dark: #1a1a1a;
            --white: #ffffff;
            --card-bg: #222222;
            --accent-blue: #00CCFF;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Times New Roman', Times, Georgia, serif;
            background: #0d0d0d; 
            color: var(--white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* ===== NAVIGATION BAR ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: #111111;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(197, 160, 89, 0.2);
            border-bottom: 2px solid var(--deep-gold);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-img {
            height: 50px;
            width: 50px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
        }

        .logo span {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--primary-gold);
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--primary-gold);
        }

        /* ===== HERO VIEWPORT (FIXED HEIGHT & FLASH CUT ACTION) ===== */
        .hero-view-port {
            margin-top: 75px;
            width: 100%;
            height: 650px; 
            position: relative;
            overflow: hidden;
            background: #0d0d0d; 
            border-bottom: 3px solid var(--deep-gold);
        }

        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* স্লাইড লেয়ার */
        .full-slide-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            visibility: hidden;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease-in-out, visibility 0.6s ease-in-out;
            background: #0d0d0d;
        }

        /* একটিভ স্লাইড ভিউ */
        .full-slide-layer.active {
            opacity: 1;
            visibility: visible;
            z-index: 2;
        }

        /* ফ্ল্যাশ কাট রেসপন্সিভ ইমেজ পলিসি */
        .slide-bg-img {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: 100%;
            object-fit: contain; 
        }

        /* প্রথম স্লাইডের ইমেজের টেক্সট ওভারলে */
        .first-slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .original-text-box {
            position: relative;
            z-index: 3;
            max-width: 850px;
            width: 90%;
            text-align: center;
            padding: 0 1rem;
        }

        .original-text-box h1 {
            font-size: 4.2rem;
            font-weight: 900;
            margin-bottom: 1.5rem;
            color: var(--primary-gold);
            letter-spacing: 2px;
            line-height: 1.2;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.9);
        }

        .original-text-box p {
            font-size: 1.4rem;
            margin-bottom: 2.5rem;
            color: #ffffff;
            line-height: 1.8;
            text-shadow: 0 3px 10px rgba(0, 0, 0, 0.9);
        }

        .cta-button {
            display: inline-block;
            padding: 1.1rem 3.5rem;
            background: linear-gradient(135deg, var(--deep-gold), #ecd599);
            color: #000;
            text-decoration: none;
            border-radius: 4px;
            font-weight: 800;
            font-size: 1.1rem;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            border: 1px solid var(--primary-gold);
        }

        .cta-button:hover {
            transform: translateY(-3px);
            background: linear-gradient(135deg, var(--primary-gold), #FFE55C);
        }

        /* ===== SECTION TITLE STYLE ===== */
        .section-title {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            color: var(--primary-gold);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
        }

        /* ===== PROFILE / AGENT BIOGRAPHY ===== */
        .profile-section {
            padding: 6rem 2rem;
            background: var(--luxury-dark);
            border-bottom: 1px solid rgba(255,215,0,0.15);
        }

        .profile-container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4rem;
            align-items: center;
        }

        .profile-image-box img {
            width: 100%;
            max-width: 420px;
            border-radius: 12px;
            border: 3px solid var(--deep-gold);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .profile-info h2 {
            font-size: 3rem;
            color: var(--primary-gold);
            margin-bottom: 0.5rem;
            font-weight: 900;
        }

        .profile-badge {
            display: inline-block;
            background: rgba(255, 215, 0, 0.1);
            color: var(--primary-gold);
            padding: 0.5rem 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            font-weight: 700;
            border: 1px solid var(--deep-gold);
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .profile-info p {
            font-size: 1.2rem;
            line-height: 1.8;
            color: #dddddd;
            margin-bottom: 1.5rem;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
        }

        .stat-item {
            background: var(--dark-black);
            padding: 1.5rem;
            border-radius: 6px;
            text-align: center;
            border-top: 3px solid var(--deep-gold);
        }

        .stat-number {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--primary-gold);
        }

        .stat-label {
            font-size: 0.9rem;
            color: #aaaaaa;
            text-transform: uppercase;
        }

        /* ===== PREMIUM LOTTERY OPERATORS & SERVICES ===== */
        .services-section {
            padding: 6rem 2rem;
            background: var(--dark-black);
            border-bottom: 1px solid rgba(255,215,0,0.15);
        }

        .services-grid {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            margin-top: 4rem;
        }

        .service-card {
            background: var(--card-bg);
            border-radius: 8px;
            border: 1px solid rgba(197, 160, 89, 0.2);
            padding: 2.5rem 2rem;
            text-align: center;
            transition: all 0.3s ease;
        }

        .service-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary-gold);
        }
