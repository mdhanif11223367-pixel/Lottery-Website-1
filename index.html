<!DOCTYPE html>
<html lang="en">
<head>

    <style>
        /* ===== GLOBAL RESET & PRESTIGIOUS SERIF FONTS ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-gold: #FFD700;
            --deep-gold: #C5A059;
            --dark-black: #0a0a0a;
            --luxury-dark: #121212;
            --white: #ffffff;
            --card-bg: #161616;
            --accent-red: #FF4444;
            --accent-blue: #00CCFF;
        }

        html, body {
            width: 100%;
            height: 100%;
            font-family: 'Times New Roman', Times, Georgia, serif;
            background: var(--dark-black);
            color: var(--white);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* ===== NAVIGATION BAR ===== */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: linear-gradient(135deg, var(--dark-black) 0%, #161616 100%);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(197, 160, 89, 0.2);
            border-bottom: 2px solid var(--deep-gold);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-img {
            height: 50px;
            width: 50px;
            object-fit: contain;
            border-radius: 50%;
            border: 2px solid var(--primary-gold);
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.4);
        }

        .logo span {
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--primary-gold);
            letter-spacing: 2px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 2rem;
        }

        nav a {
            color: var(--white);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.3s ease;
        }

        nav a:hover {
            color: var(--primary-gold);
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }

        /* ===== ADVANCED RESPONSIVE HERO VIEWPORT ===== */
        .hero-view-port {
            margin-top: 75px;
            width: 100%;
            height: 620px; /* ডেস্কটপ স্ট্যান্ডার্ড হাইট */
            position: relative;
            overflow: hidden;
            background: #000;
            border-bottom: 3px solid var(--deep-gold);
        }

        /* ক্যানভাস লেয়ার */
        #particleCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 4;
            pointer-events: none;
        }

        /* ফুল স্লাইড লেয়ার কনটেইনার */
        .full-slide-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.5s ease-in-out, filter 1.5s ease-in-out, transform 1.5s ease-in-out;
            transform: scale(1.02);
            filter: blur(15px) brightness(0.2);
            background: #000;
        }

        /* একটিভ স্লাইড ভিউ */
        .full-slide-layer.active {
            opacity: 1;
            z-index: 2;
            transform: scale(1);
            filter: blur(0px) brightness(1);
        }

        /* রেসপন্সিভ ইমেজ পলিসি: অ্যান্ড্রয়েড বা ডেস্কটপে কোনো ডিজাইন কাটবে না */
        .slide-bg-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain; /* ইমেজ ক্রপ বা কেটে যাওয়া শতভাগ রোধ করবে */
            background-color: #000; /* অবজেক্ট ফিটের খালি অংশ কালো ব্যাকগ্রাউন্ড দিয়ে মাস্ক করবে */
        }

        /* প্রথম স্লাইডের ইমেজের ওভারলে */
        .first-slide::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(10,10,10,0.2) 0%, rgba(10,10,10,0.7) 100%);
            z-index: 2;
        }
